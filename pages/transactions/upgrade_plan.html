<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Your Plan</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        .pricing-container { display: flex; gap: 40px; justify-content: center; align-items: stretch; width: 90%; max-width: 1200px; margin: 0 auto; padding-top: 50px; }
        .plan-card { flex: 1; background: rgba(0, 15, 30, 0.9); border: 2px solid #004080; border-radius: 20px; padding: 40px; display: flex; flex-direction: column; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .plan-card:hover { border-color: #00d9ff; box-shadow: 0 0 30px rgba(0, 217, 255, 0.3); transform: translateY(-5px); }
        .plan-header { text-align: center; margin-bottom: 20px; }
        .plan-title { font-family: 'FlameInferno', sans-serif; font-size: 2.8rem; color: #ff3300; text-shadow: 0 0 15px #ff0000; margin: 0; }
        .plan-price { font-size: 2.2rem; color: #00d9ff; margin: 10px 0; font-weight: bold; font-family: 'Orbitron', sans-serif; }
        .feature-list { list-style: none; padding: 0; margin: 30px 0; flex-grow: 1; }
        .feature-item { color: #ffffff; font-size: 1.1rem; margin-bottom: 15px; padding-left: 35px; position: relative; line-height: 1.4; }
        .feature-item::before { content: '⚡'; position: absolute; left: 0; color: #00d9ff; filter: drop-shadow(0 0 5px #00d9ff); }
        .cta-container { display: flex; justify-content: center; margin-top: 20px; }
        .menu-btn { width: 100%; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div class="fire-bg-layer">
            <canvas id="fireCanvas"></canvas>
            <div class="smoke-overlay"></div>
        </div>
        <div class="content-ui">
            <div class="pricing-container">
                <div class="plan-card">
                    <div class="plan-header">
                        <h2 class="plan-title">PRO ACCESS</h2>
                        <div class="plan-price">$7 / MO</div>
                    </div>
                    <ul class="feature-list">
                        <li class="feature-item">High-Speed Local Inference</li>
                        <li class="feature-item">GPU Acceleration: Level 5</li>
                        <li class="feature-item">File Uploads: Up to 500MB</li>
                        <li class="feature-item">Advanced Data Analysis</li>
                    </ul>
                    <div class="cta-container">
                        <button class="menu-btn glow-target" onclick="location.href='buy_pro.html'">SELECT PRO</button>
                    </div>
                </div>

                <div class="plan-card" style="border-color: #ff3300;">
                    <div class="plan-header">
                        <h2 class="plan-title">ENTERPRISE</h2>
                        <div class="plan-price">$15 / MO</div>
                    </div>
                    <ul class="feature-list">
                        <li class="feature-item">GPU Acceleration: Level 8 (MAX)</li>
                        <li class="feature-item">Unlimited Repository Analysis</li>
                        <li class="feature-item">Multi-Modal Video Analysis</li>
                        <li class="feature-item">Priority Processing Core</li>
                    </ul>
                    <div class="cta-container">
                        <button class="menu-btn glow-target active-glow" onclick="location.href='buy_enterprise.html'">GO UNLIMITED</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../styles/flame_atmosphere.js"></script>
</body>
</html>
