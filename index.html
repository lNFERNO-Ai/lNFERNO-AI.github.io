<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INFERNO AI</title>
    <link rel="stylesheet" href="styles/style.css">
    <meta name="description" content="Fast, Personalized, Awesome. Inferno">
    <meta name="google-site-verification" content="IGZaQUzaKQHBrBpddYK1ftXCV9OrEnBuPkzunU3aeVU" />
</head>
<body>
    <div id="app-wrapper">
        <div class="fire-bg-layer">
            <canvas id="fireCanvas"></canvas>
            <div class="smoke-overlay"></div>
        </div>

        <div class="content-ui">
            <header class="header-container">
                <div align="left">
    <img src="icon.png" width="150" height="150" alt="Logo" align="left">
</div>
                <h1 class="fire-text">Inferno AI</h1>
            </header>

            <div class="button-group">
                <button class="menu-btn glow-target" onclick="window.location.href='chat.html'">START CHATTING</button>
                <button class="menu-btn glow-target" onclick="window.location.href='pages/transactions/upgrade_plans.html'">PAID PLANS</button>
                <button class="menu-btn glow-target" onclick="window.location.href='extensions/index.html'">EXTENSIONS</button>
            </div>
        </div>
    </div>

    <svg width="0" height="0" style="position:absolute;">
        <filter id="heat" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="1">
                <animate attributeName="seed" from="1" to="100" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="15" />
        </filter>
    </svg>

    <script src="styles/flame_atmosphere.js" defer></script>
</body>
</html>
